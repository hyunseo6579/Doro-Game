<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Doro Game - Fixed</title>

  <script src="/unpkg/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="/unpkg/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="/unpkg/@discord/embedded-app-sdk"></script>
  <script src="/unpkg/@babel/standalone/babel.min.js"></script>
  <script src="/tailwind"></script>

  <!-- use the following line to run on non-discord  -->
  <!-- 
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@discord/embedded-app-sdk"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
   -->

  <style>
    html, body, #root {
      height: 100% !important;
      width: 100% !important;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #0f172a;
    }
    .game-cell { aspect-ratio: 1 / 1; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CLIENT_ID = "1496343319687729292";

    // Discord Activity URL mappings
    if (window.DiscordSDK?.patchUrlMappings) {
      window.DiscordSDK.patchUrlMappings([
        { prefix: "/", target: "doro-game.vercel.app" },
        { prefix: "/unpkg", target: "unpkg.com" },
        { prefix: "/tailwind", target: "cdn.tailwindcss.com" }
      ]);
    }

    // Safely detect the SDK regardless of how the UMD bundle exposes it.
    const DiscordSDKCtor =
      window.DiscordSDK?.DiscordSDK ||
      window.DiscordSDK ||
      window.discordSdk?.DiscordSDK ||
      null;

    const discordSdk = DiscordSDKCtor ? new DiscordSDKCtor(CLIENT_ID) : null;

    const COLS = 20;
    const ROWS = 10;
    const TIME_LIMIT = 60000;
    const DORO_IMG_URL = "doro.png";
    const BGM_URL = "bgm.mp3";
    const MATCH_SOUND_URL = "soundeffect.mp3"; 

    const generateGrid = () => {
      const newGrid = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          newGrid.push({
            id: `${r}-${c}`,
            row: r,
            col: c,
            value: Math.floor(Math.random() * 9) + 1,
            isCleared: false,
          });
        }
      }
      return newGrid;
    };

    function App() {
      const [gameState, setGameState] = useState("playing");
      const [grid, setGrid] = useState(() => generateGrid());
      const [score, setScore] = useState(0);
      const [highScore, setHighScore] = useState(0);
      const [timeLeft, setTimeLeft] = useState(TIME_LIMIT);
      const [selection, setSelection] = useState(null);
      const [sdkStatus, setSdkStatus] = useState("initializing");
      const [isScoreAnimating, setIsScoreAnimating] = useState(false);
      const [isMuted, setIsMuted] = useState(false);

      const boardRef = useRef(null);
      const bgmRef = useRef(null);
      // Handle Background Music
      useEffect(() => {
        if (BGM_URL) {
          bgmRef.current = new Audio(BGM_URL);
          bgmRef.current.loop = true;
          bgmRef.current.volume = 0.4;
        }
        
        return () => {
          if (bgmRef.current) {
            bgmRef.current.pause();
            bgmRef.current = null;
          }
        };
      }, []);
      
      useEffect(() => {
        if (!bgmRef.current) return;
        if (gameState === 'playing' && !isMuted) {
          bgmRef.current.play().catch(() => {
            console.log("Autoplay blocked. BGM will start after user interaction.");
          });
        } else {
          bgmRef.current.pause();
        }
      }, [gameState, isMuted]);

      useEffect(() => {
        const setupDiscord = async () => {
          if (!discordSdk) {
            console.warn("Discord SDK not found. Running as normal web page.");
            setSdkStatus("browser");
            return;
          }

          try {
            await discordSdk.ready();
            console.log("Discord SDK ready");
            setSdkStatus("discord");
          } catch (e) {
            console.warn("Discord SDK failed or running outside Discord.", e);
            setSdkStatus("browser");
          }
        };

        setupDiscord();
      }, []);

      useEffect(() => {
        if (gameState !== "playing") return;

        const interval = setInterval(() => {
          setTimeLeft((prev) => {
            if (prev <= 100) {
              setGameState("gameover");
              return 0;
            }
            return prev - 100;
          });
        }, 100);

        return () => clearInterval(interval);
      }, [gameState]);

      useEffect(() => {
        if (gameState === 'gameover' && score > highScore) {
          setHighScore(score);
        }
      }, [gameState, score, highScore]);
      
      const playPopSound = () => {
        if (!isMuted && MATCH_SOUND_URL) {
          const pop = new Audio(MATCH_SOUND_URL);
          pop.play().catch(e => console.log("Sound play failed", e));
        }
      };

      const startGame = async () => {
        setGrid(generateGrid());
        setScore(0);
        setTimeLeft(TIME_LIMIT);
        setSelection(null);
        setGameState("playing");

        if (bgmRef.current && !isMuted) {
          try {
            bgmRef.current.currentTime = 0;
            await bgmRef.current.play();
          } catch {}
        }
      };

      const getCellFromEvent = (e) => {
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const cell = el?.closest('.game-cell');
        if (cell) {
          return {
            row: parseInt(cell.dataset.row, 10),
            col: parseInt(cell.dataset.col, 10)
          };
        }
        return null;
      };

      const handlePointerDown = async (e) => {
        if (bgmRef.current && !isMuted) {
          try {
            await bgmRef.current.play();
          } catch (err) {
            console.log("Audio still blocked:", err);
          }
        }

        const el = document.elementFromPoint(e.clientX, e.clientY);
        const cell = el?.closest(".game-cell");
        if (!cell || !boardRef.current) return;

        try {
          boardRef.current.setPointerCapture(e.pointerId);
        } catch (err) {
          console.warn("Could not capture pointer", err);
        }

        const r = parseInt(cell.dataset.row, 10);
        const c = parseInt(cell.dataset.col, 10);
        setSelection({ startRow: r, startCol: c, endRow: r, endCol: c });
      };

      const handlePointerMove = (e) => {
        if (!selection) return;
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const cell = el?.closest(".game-cell");
        if (!cell) return;

        setSelection((prev) => ({
          ...prev,
          endRow: parseInt(cell.dataset.row, 10),
          endCol: parseInt(cell.dataset.col, 10),
        }));
      };

      const handlePointerUp = () => {
        if (!selection) return;
        evaluateSelection(selection);
        setSelection(null);
      };

      const evaluateSelection = (sel) => {
        const minR = Math.min(sel.startRow, sel.endRow);
        const maxR = Math.max(sel.startRow, sel.endRow);
        const minC = Math.min(sel.startCol, sel.endCol);
        const maxC = Math.max(sel.startCol, sel.endCol);

        let sum = 0;
        let indices = [];

        grid.forEach((cell, i) => {
          if (
            cell.row >= minR &&
            cell.row <= maxR &&
            cell.col >= minC &&
            cell.col <= maxC &&
            !cell.isCleared
          ) {
            sum += cell.value;
            indices.push(i);
          }
        });

        if (sum === 10) {
          playPopSound(); // MATCH SOUND EFFECT TRIGGERED HERE
          setGrid((prev) => {
            const next = [...prev];
            indices.forEach((idx) => {
              next[idx] = { ...next[idx], isCleared: true };
            });
            return next;
          });

          const cellCount = indices.length;
          const extraPoints = cellCount > 2 ? (cellCount - 2) * 100 : 0;
          setScore((s) => s + 1000);
        }
      };

      const statusLabel =
        sdkStatus === "discord"
          ? "Running in Discord"
          : sdkStatus === "browser"
          ? "Running in Browser"
          : "Initializing";

      return (
        <div className="flex flex-col h-full w-full bg-slate-900 text-white">
          <div className="flex justify-between items-center px-6 py-6 sm:py-8 bg-slate-800 border-b-4 border-pink-500 shadow-2xl z-20">
            <div className="flex items-center gap-4 sm:gap-6">
              <div className="w-16 h-16 sm:w-24 sm:h-24 bg-white/10 rounded-full p-1 flex items-center justify-center border-2 border-pink-400 floating-icon overflow-hidden">
                <img 
                  src={DORO_IMG_URL} 
                  alt="Doro Icon" 
                  className="w-full h-full object-cover rounded-full"
                />
              </div>
              <div className="flex flex-col">
                <h1 className="text-3xl sm:text-5xl font-bold tracking-tighter text-pink-500 uppercase">
                  Doro Game
                </h1>
              </div>
            </div>
            <div className="flex items-center gap-4 sm:gap-8">
              <button 
                onClick={() => setIsMuted(!isMuted)}
                className="p-2 hover:bg-slate-700 rounded-lg text-pink-400 transition-colors"
                title={isMuted ? "Unmute" : "Mute"}
              >
                {isMuted ? (
                  <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
                ) : (
                  <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                )}
              </button>
              
              <div className={`flex flex-col items-end transition-transform ${isScoreAnimating ? 'animate-score' : ''}`}>
                <span className="text-xs sm:text-sm font-bold text-pink-400 uppercase tracking-widest">Score</span>
                <div className="text-5xl sm:text-7xl font-mono font-black text-white drop-shadow-[0_4px_4px_rgba(0,0,0,0.5)]">
                  {score.toLocaleString()}
                </div>
              </div>
            </div>
          </div>

          {/* Timer Bar */}
          <div className="w-full h-5 bg-slate-700 overflow-hidden relative">
            <div 
              className={`absolute inset-y-0 left-0 transition-all duration-100 ease-linear ${
                timeLeft > 30000 ? 'bg-pink-500' : timeLeft > 10000 ? 'bg-purple-500' : 'bg-red-600'
              }`}
              style={{ width: `${(timeLeft / TIME_LIMIT) * 100}%` }}
            ></div>
          </div>

          <div className="flex-1 w-full bg-slate-900 flex justify-center items-center p-4 overflow-hidden relative">
            <div
              ref={boardRef}
              className="w-full max-h-full max-w-7xl touch-none grid gap-2 sm:gap-3"
              style={{
                gridTemplateColumns: `repeat(${COLS}, minmax(0, 1fr))`,
              }}
              onPointerDown={handlePointerDown}
              onPointerMove={handlePointerMove}
              onPointerUp={handlePointerUp}
              onPointerCancel={handlePointerUp}
              onContextMenu={(e) => e.preventDefault()}
            >
              {grid.map((cell) => {
                let isSelected = false;
                if (selection && !cell.isCleared) {
                  const minRow = Math.min(selection.startRow, selection.endRow);
                  const maxRow = Math.max(selection.startRow, selection.endRow);
                  const minCol = Math.min(selection.startCol, selection.endCol);
                  const maxCol = Math.max(selection.startCol, selection.endCol);
                  isSelected =
                    cell.row >= minRow && cell.row <= maxRow &&
                    cell.col >= minCol && cell.col <= maxCol;
                }

                return (
                  <div
                    key={cell.id}
                    data-row={cell.row}
                    data-col={cell.col}
                    className={`game-cell flex items-center justify-center text-xs sm:text-base md:text-xl lg:text-2xl font-bold rounded-lg select-none touch-none transition-all duration-150 border-b-4 border-black/20
                      ${cell.isCleared ? 'opacity-0 pointer-events-none' : 'bg-[#C7A8E6] text-black shadow-lg'}
                      ${isSelected ? 'ring-4 ring-white scale-110 z-10 shadow-2xl brightness-110' : ''}
                    `}
                  >
                    {!cell.isCleared && cell.value}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Game Over Overlay */}
          {gameState === 'gameover' && (
            <div className="absolute inset-0 bg-slate-950/90 backdrop-blur-md flex flex-col justify-center items-center z-50 text-white p-6 text-center">
              <div className="w-32 h-32 mb-6 overflow-hidden rounded-full border-4 border-pink-500">
                <img src={DORO_IMG_URL} className="w-full h-full object-cover" alt="Character" />
              </div>
              <h1 className="text-5xl sm:text-7xl font-bold mb-4 text-pink-500 uppercase tracking-tighter">Time's Up!</h1>
              
              <div className="flex flex-col sm:flex-row gap-8 sm:gap-16 mb-12">
                <div className="bg-slate-800/80 p-6 rounded-2xl border-2 border-pink-500/30">
                  <p className="text-xl sm:text-2xl text-pink-200 uppercase font-bold">Final Score</p>
                  <span className="text-6xl sm:text-8xl text-white font-black mt-2 block drop-shadow-lg">{score.toLocaleString()}</span>
                </div>
                <div className="bg-slate-800/80 p-6 rounded-2xl border-2 border-purple-500/30">
                  <p className="text-xl sm:text-2xl text-purple-200 uppercase font-bold">Highest Score</p>
                  <span className="text-6xl sm:text-8xl text-pink-400 font-black mt-2 block drop-shadow-lg">{Math.max(score, highScore).toLocaleString()}</span>
                </div>
              </div>
              
              <button
                onClick={startGame}
                className="px-16 py-6 bg-pink-600 rounded-full text-3xl font-bold uppercase tracking-widest shadow-2xl shadow-pink-500/40 hover:scale-105 active:scale-95 transition-all w-full max-w-md"
              >
                Retry!
              </button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
