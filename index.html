<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Doro Game - Fixed</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@discord/embedded-app-sdk"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body, #root {
      height: 100% !important;
      width: 100% !important;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #0f172a;
    }
    .game-cell { aspect-ratio: 1 / 1; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CLIENT_ID = "1496343319687729292";

    // Safely detect the SDK regardless of how the UMD bundle exposes it.
    const DiscordSDKCtor =
      window.DiscordSDK?.DiscordSDK ||
      window.DiscordSDK ||
      window.discordSdk?.DiscordSDK ||
      null;

    const discordSdk = DiscordSDKCtor ? new DiscordSDKCtor(CLIENT_ID) : null;

    const COLS = 20;
    const ROWS = 10;
    const TIME_LIMIT = 60000;
    const DORO_IMG_URL = "doro.png";

    const generateGrid = () => {
      const newGrid = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          newGrid.push({
            id: `${r}-${c}`,
            row: r,
            col: c,
            value: Math.floor(Math.random() * 9) + 1,
            isCleared: false,
          });
        }
      }
      return newGrid;
    };

    function App() {
      const [gameState, setGameState] = useState("playing");
      const [grid, setGrid] = useState(() => generateGrid());
      const [score, setScore] = useState(0);
      const [timeLeft, setTimeLeft] = useState(TIME_LIMIT);
      const [selection, setSelection] = useState(null);
      const [sdkStatus, setSdkStatus] = useState("initializing");
      const boardRef = useRef(null);

      useEffect(() => {
        const setupDiscord = async () => {
          if (!discordSdk) {
            console.warn("Discord SDK not found. Running as normal web page.");
            setSdkStatus("browser");
            return;
          }

          try {
            await discordSdk.ready();
            console.log("Discord SDK ready");
            setSdkStatus("discord");
          } catch (e) {
            console.warn("Discord SDK failed or running outside Discord.", e);
            setSdkStatus("browser");
          }
        };

        setupDiscord();
      }, []);

      useEffect(() => {
        if (gameState !== "playing") return;

        const interval = setInterval(() => {
          setTimeLeft((prev) => {
            if (prev <= 100) {
              setGameState("gameover");
              return 0;
            }
            return prev - 100;
          });
        }, 100);

        return () => clearInterval(interval);
      }, [gameState]);

      const handlePointerDown = (e) => {
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const cell = el?.closest(".game-cell");
        if (!cell || !boardRef.current) return;

        try {
          boardRef.current.setPointerCapture(e.pointerId);
        } catch (err) {
          console.warn("Could not capture pointer", err);
        }

        const r = parseInt(cell.dataset.row, 10);
        const c = parseInt(cell.dataset.col, 10);
        setSelection({ startRow: r, startCol: c, endRow: r, endCol: c });
      };

      const handlePointerMove = (e) => {
        if (!selection) return;
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const cell = el?.closest(".game-cell");
        if (!cell) return;

        setSelection((prev) => ({
          ...prev,
          endRow: parseInt(cell.dataset.row, 10),
          endCol: parseInt(cell.dataset.col, 10),
        }));
      };

      const handlePointerUp = () => {
        if (!selection) return;
        evaluateSelection(selection);
        setSelection(null);
      };

      const evaluateSelection = (sel) => {
        const minR = Math.min(sel.startRow, sel.endRow);
        const maxR = Math.max(sel.startRow, sel.endRow);
        const minC = Math.min(sel.startCol, sel.endCol);
        const maxC = Math.max(sel.startCol, sel.endCol);

        let sum = 0;
        let indices = [];

        grid.forEach((cell, i) => {
          if (
            cell.row >= minR &&
            cell.row <= maxR &&
            cell.col >= minC &&
            cell.col <= maxC &&
            !cell.isCleared
          ) {
            sum += cell.value;
            indices.push(i);
          }
        });

        if (sum === 10) {
          setGrid((prev) => {
            const next = [...prev];
            indices.forEach((idx) => {
              next[idx] = { ...next[idx], isCleared: true };
            });
            return next;
          });
          setScore((s) => s + 1000);
        }
      };

      const statusLabel =
        sdkStatus === "discord"
          ? "Running in Discord"
          : sdkStatus === "browser"
          ? "Running in Browser"
          : "Initializing";

      return (
        <div className="flex flex-col h-full w-full bg-slate-900 text-white">
          <div className="p-4 bg-slate-800 border-b-2 border-pink-500 flex justify-between items-center gap-4">
            <div className="flex items-center gap-2">
              <img src={DORO_IMG_URL} alt="Doro" className="w-8 h-8 rounded object-cover" onError={(e)=>{e.currentTarget.style.display='none';}} />
              <h1 className="text-xl font-bold text-pink-500">DORO GAME</h1>
            </div>
            <div className="text-sm text-slate-300">{statusLabel}</div>
            <div className="text-xl font-mono">Score: {score}</div>
          </div>

          <div className="w-full h-2 bg-slate-700">
            <div
              className="h-full bg-pink-500 transition-all"
              style={{ width: `${(timeLeft / TIME_LIMIT) * 100}%` }}
            />
          </div>

          <div className="flex-1 p-2 flex items-center justify-center overflow-hidden">
            <div
              ref={boardRef}
              className="grid gap-1 w-full max-w-4xl touch-none select-none"
              style={{ gridTemplateColumns: `repeat(${COLS}, 1fr)` }}
              onPointerDown={handlePointerDown}
              onPointerMove={handlePointerMove}
              onPointerUp={handlePointerUp}
            >
              {grid.map((cell) => (
                <div
                  key={cell.id}
                  data-row={cell.row}
                  data-col={cell.col}
                  className={`game-cell flex items-center justify-center text-xs font-bold rounded-sm border-b-2 border-black/20 ${
                    cell.isCleared ? "opacity-0" : "bg-[#C7A8E6] text-black"
                  }`}
                >
                  {!cell.isCleared && cell.value}
                </div>
              ))}
            </div>
          </div>

          {gameState === "gameover" && (
            <div className="absolute inset-0 bg-black/80 flex flex-col items-center justify-center z-50">
              <h2 className="text-4xl font-bold text-pink-500 mb-4">GAME OVER</h2>
              <button
                onClick={() => window.location.reload()}
                className="px-8 py-3 bg-pink-600 rounded-full font-bold"
              >
                RETRY
              </button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
